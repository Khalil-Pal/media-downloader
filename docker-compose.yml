version: "3.9"

services:
  sandy_squirrel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sandy_squirrel_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist downloads and logs outside the container
      - ./temp_downloads:/app/temp_downloads
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    # Resource limits.
    # Memory is set to 2.5 GB to give comfortable headroom for a 2 GB download
    # (the file lives on disk, but the upload buffer and yt-dlp metadata
    # can add ~200-300 MB of process RSS on top of a large file).
    # Tune cpus downward on a shared VPS if needed.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2500M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"